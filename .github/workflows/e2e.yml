name: PocketVibe E2E

on: [push, pull_request]

jobs:
  e2e:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --debug

      - name: Run E2E on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: arm64-v8a
          script: |
            adb root
            bash scripts/ci_provision_termux.sh
            bash scripts/ci_verify_termux_pipeline.sh
            adb install -r build/app/outputs/flutter-apk/app-debug.apk
            adb shell pm grant com.pocketvibe.ide com.termux.permission.RUN_COMMAND

      - name: Upload logs if failed
        if: failure()
        run: adb logcat -d > logcat_dump.txt
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: failure-logs
          path: logcat_dump.txt

      - name: Build Release APK (main only)
        if: github.ref == 'refs/heads/main' && secrets.ANDROID_KEYSTORE_BASE64 != ''
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.jks
          flutter build apk --release
        env:
          KEYSTORE_PATH: android/app/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload Release APK
        if: github.ref == 'refs/heads/main' && secrets.ANDROID_KEYSTORE_BASE64 != ''
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
