name: pocketvibe_ide
description: PocketVibe IDE — AI-powered coding assistant on Android
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  dio: ^5.4.3+1
  path_provider: ^2.1.3
  re_editor: ^0.10.0
  re_highlight: ^0.0.3
  flutter_secure_storage: ^9.2.2
  google_fonts: ^6.2.1
  shared_preferences: ^2.2.2
  uuid: ^4.4.0
  intl: ^0.19.0
  url_launcher: ^6.2.6
  file_picker: ^8.1.6
  lottie: ^3.1.2
  flutter_svg: ^2.0.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/termux_scripts/
    - assets/lottie/
    - assets/icons/
