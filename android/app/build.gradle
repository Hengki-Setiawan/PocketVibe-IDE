plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.pocketvibe.ide"
    compileSdk = 36
    ndkVersion = "26.1.10909125"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        applicationId = "com.pocketvibe.ide"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = 29
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    signingConfigs {
        release {
            def keystorePath = System.getenv('KEYSTORE_PATH')
            if (keystorePath != null) {
                storeFile = file(keystorePath)
                storePassword = System.getenv('KEYSTORE_PASSWORD') ?: 'pocketvibe123'
                keyAlias = System.getenv('KEY_ALIAS') ?: 'pocketvibe'
                keyPassword = System.getenv('KEY_PASSWORD') ?: 'pocketvibe123'
            }
        }
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.release
            minifyEnabled true
            proguardFiles(
                getDefaultProguardFile('proguard-android-optimize.txt'),
                'proguard-rules.pro',
            )
        }
    }
}

flutter {
    source = "../.."
}
